<!DOCTYPE html>
<html>

<head>

    <title>Organic Farm Statistics</title>

    <style>

        body{
            font-family:Arial;
            background:#eef7ee;
            margin:40px;
        }

        h1{
            color:green;
        }

        textarea{
            width:100%;
            height:120px;
            font-size:18px;
        }

        button{

            padding:12px 20px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
            margin-top:10px;

        }

        #result{

            margin-top:30px;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 8px gray;

        }

    </style>

</head>

<body>

<h1>🌱 Organic Farm Statistical Assistant</h1>

<textarea
id="question"
placeholder="Ask something...
Example:
What is organic farming?
How to improve soil fertility?
Best crops for summer?
Benefits of vermicompost?
">
</textarea>

<br>

<button onclick="askAI()">
Ask Ollama
</button>

<div id="result">

<h3>Answer</h3>

<p id="answer"></p>

</div>


<script>

async function askAI(){

    let question=document.getElementById("question").value;

    let response=await fetch("/ask",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            question:question
        })

    });

    let data=await response.json();

    document.getElementById("answer").innerHTML=data.answer;

}

</script>

</body>

</html>
